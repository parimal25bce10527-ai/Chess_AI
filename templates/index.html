<!DOCTYPE html>
<html>
<head>
    <title>Intelligent Chess Evaluator</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 40px; background-color: #f4f4f9;}
        #board { width: 500px; margin-bottom: 20px;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #2c3e50; color: white; border: none; border-radius: 5px; transition: 0.2s;}
        button:hover { background-color: #1a252f; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd;}
        select { padding: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer;}

        /* Progress bar container */
        #progress-container {
            display: none;
            width: 300px;
            margin-top: 20px;
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #2c3e50;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        /* Indeterminate animation (moving stripe) */
        .progress-fill.indeterminate {
            width: 30%;
            animation: moveStripe 1.5s linear infinite;
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,0.2) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0.2) 75%,
                transparent 75%,
                transparent
            );
            background-size: 40px 40px;
        }
        @keyframes moveStripe {
            0% { background-position: 0 0; width: 30%; margin-left: 0; }
            100% { background-position: 40px 0; width: 100%; margin-left: 0; }
        }
        .loading-text {
            font-size: 14px;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h2>BYOP: Dual-Engine Minimax AI</h2>
    
    <div class="controls">
        <label for="engine-select"><strong>Active Brain: </strong></label>
        <select id="engine-select">
            <option value="standard">Standard AI (Depth 3 - python-chess)</option>
            <option value="bullet">High-Speed AI (Depth 4 - bulletchess)</option>
        </select>
    </div>

    <div id="board"></div>
    <button onclick="resetBoard()">Reset Game</button>

    <div id="progress-container">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill indeterminate"></div>
        </div>
        <div class="loading-text">AI is thinking...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var isThinking = false;

        function onDrop(source, target) {
            if (isThinking) {
                alert("AI is thinking, please wait...");
                return 'snapback';
            }

            const movingColor = game.turn() === 'w' ? 'white' : 'black';

            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            let uciMove = move.from + move.to;
            if (move.promotion) uciMove += move.promotion;

            let engineChoice = document.getElementById('engine-select').value;

            if (movingColor === 'white') {
                isThinking = true;
                document.getElementById('progress-container').style.display = 'block';
                // Reset progress bar (ensure it's indeterminate)
                const fill = document.getElementById('progress-fill');
                fill.classList.add('indeterminate');
            }

            fetch('/make_move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    move: uciMove, 
                    color: movingColor, 
                    engine: engineChoice 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    alert(data.error);
                    game.undo();
                    board.position(game.fen());
                } else {
                    game.load(data.fen);
                    board.position(data.fen);
                    if (data.suggested_move) {
                        alert(`Suggested black move: ${data.suggested_move}`);
                    }
                    if (data.game_over) {
                        setTimeout(() => alert("Game Over!"), 200);
                    }
                }
            })
            .catch(error => {
                console.error('Fetch error:', error);
                alert('Error communicating with server');
                game.undo();
                board.position(game.fen());
            })
            .finally(() => {
                if (movingColor === 'white') {
                    isThinking = false;
                    document.getElementById('progress-container').style.display = 'none';
                    // Remove indeterminate class to reset for next time
                    const fill = document.getElementById('progress-fill');
                    fill.classList.remove('indeterminate');
                }
            });
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);

        function resetBoard() {
            fetch('/reset', { method: 'POST' }).then(() => {
                game.reset();
                board.start();
            }).catch(err => console.error(err));
        }
    </script>
</body>
</html>
